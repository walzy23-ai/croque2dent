<script src="https://js.stripe.com/v3/"></script>

<script>
const stripe = Stripe("pk_test_51TFGZlAVHDm8vbSovaFf9JhGZv8XNMLxMGOEbySZIgHOIaliFATiuVDVVrmULtfss85rJML7dAmH4VS3A4jqj6KB00uQal85g3");

let panier = [];
let total = 0;

function ajouter(nom, prix) {
  panier.push({nom, prix});
  total += prix;
  afficher();
}

function afficher() {
  let liste = document.getElementById("liste");
  liste.innerHTML = "";

  panier.forEach((p) => {
    liste.innerHTML += `<div>${p.nom} - ${p.prix}€</div>`;
  });

  document.getElementById("total").innerText = total.toFixed(2);
}

function commander() {
  let nom = document.getElementById("nom").value;
  let tel = document.getElementById("tel").value;
  let heure = document.getElementById("heure").value;
  let paiement = document.getElementById("paiement").value;

  if (!nom || !tel || panier.length === 0 || !heure || !paiement) {
    alert("Merci de remplir toutes les informations !");
    return;
  }

  let now = new Date();
  let selected = new Date();

  let [h, m] = heure.split(":");
  selected.setHours(h);
  selected.setMinutes(m);
  selected.setSeconds(0);

  let diff = (selected - now) / (1000 * 60);

  if (diff < 60) {
    alert("Merci de choisir une heure au moins 1h après maintenant ⏱️");
    return;
  }

  if (paiement === "cb") {
    alert("💳 Redirection vers paiement sécurisé...");

    fetch("/api/checkout", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ panier })
    })
    .then(res => res.json())
    .then(data => {
      return stripe.redirectToCheckout({ sessionId: data.id });
    })
    .catch(err => {
      alert("Erreur paiement");
      console.error(err);
    });

    return;
  } else {
    alert("Commande validée ✅ Paiement sur place");
  }

  panier = [];
  total = 0;
  afficher();
}
</script>
